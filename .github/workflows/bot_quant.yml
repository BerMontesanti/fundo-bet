name: Executar Bot Quant

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  rodar-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: 📥 Baixar o código do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar o Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar bibliotecas necessárias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: 🚀 Rodar o Bot Quant
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_quant.py

      - name: 💾 Salvar o histórico CSV no repositório
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add historico_apostas.csv || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Atualizando histórico de apostas (CSV)" && git push)
