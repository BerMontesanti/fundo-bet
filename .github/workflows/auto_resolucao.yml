name: Auto-Resolucao de Apostas

on:
  schedule:
    # Corre às 07:00 UTC (04:00 Brasília) e às 19:00 UTC (16:00 Brasília) todos os dias
    - cron: '0 7,19 * * *'
  workflow_dispatch: # Permite rodar manualmente clicando num botão no GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar bibliotecas
        run: pip install pandas requests

      - name: Rodar Auto-Resolucao
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker_resultados.py

      - name: Commit e Push das atualizações
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add historico_apostas.csv
          git commit -m "🏁 [Auto-Resolucao] Liquidando Greens e Reds" || exit 0
          git push
