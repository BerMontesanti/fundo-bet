name: Tracker Live de Resultados e Gols

on:
  schedule:
    # Corre a cada 5 minutos, entre as 12h e as 23h UTC (Horário nobre do futebol)
    # Se quiser que corra o dia inteiro, mude para: '*/5 * * * *'
    - cron: '*/5 12-23 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar bibliotecas
        run: pip install pandas requests

      - name: Rodar Tracker Ao Vivo
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker_resultados.py

      - name: Commit e Push das atualizações de placar
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add historico_apostas.csv
          git commit -m "⚽ [Auto-Tracker] Atualização de Golos ou Fim de Jogo" || exit 0
          git push
