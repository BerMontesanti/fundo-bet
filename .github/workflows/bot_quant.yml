name: Executar Bot Quant

on:
  schedule:
    # Horário definido via Dashboard Streamlit
    - cron: '3,33 0-1,17-23 * * *'
  workflow_dispatch: # Permite rodar manualmente no botão

# ==========================================
# 🔑 PERMISSÃO GLOBAL DE ESCRITA
# ==========================================
permissions:
  contents: write 

jobs:
  rodar-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Baixar o código do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar o Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar bibliotecas necessárias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: 🚀 Rodar o Bot Quant
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_quant.py

      - name: 💾 Salvar o histórico CSV no repositório
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add historico_apostas.csv || true
          git commit -m "🤖 [Bot Quant] Atualizando histórico de apostas" || exit 0
          git push
